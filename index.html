<!DOCTYPE html>
<html>
<head>
    <title>EB - Portal</title>
    <style>
        body {
            background: #1b1b1b;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            font-size: 35px;
        }

        p {
            color: #ccc;
        }

        .botao {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .botao:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>🇧🇷 Exército Brasileiro</h1>
    <p>Portal oficial de serviços</p>

    <h2>Menu</h2>

    <button class="botao" id="comprar">
        🛒 Comprar Cargo
    </button>

    <button class="botao" id="suporte">
        🛠️ Suporte
    </button>

    <button class="botao" id="alistamento">
        🎖️ Alistamento
    </button>


    <script src="script.js"></script>

</body>
</html>
